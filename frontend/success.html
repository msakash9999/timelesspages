<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - TimelessPages</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #12110e;
      color: #f5f0eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .success-card {
      background: #1a1814;
      padding: 4rem 2rem;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid #333;
    }
    .success-icon {
      font-size: 5rem;
      color: #8B7355;
      margin-bottom: 2rem;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    p {
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: #8B7355;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #a08060;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your purchase from TimelessPages. Your order has been placed and a receipt has been sent to your email.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
  <script>
    // Clear cart on success
    localStorage.setItem('cart', '[]');
  </script>
</body>
</html>
