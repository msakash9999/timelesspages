<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - TimelessPages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="seller-dashboard.css">
    <link rel="stylesheet" href="premium-ecommerce.css">
</head>

<body>

    <nav class="seller-nav">
        <a href="index.html" class="seller-brand">TimelessPages Seller Portal</a>
        <div class="seller-nav-right">
            <span class="seller-greeting" id="sellerGreeting">Welcome, Store</span>
            <a href="index.html" class="visit-site-btn" target="_blank">Visit Site</a>
            <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar/Tabs for Seller -->
        <div class="tab-bar" style="margin-bottom: 20px;">
            <button class="tab-btn active" data-section="overview">Dashboard Overview</button>
            <button class="tab-btn" data-section="seller-insights">Seller Insights</button>
        </div>

        <div id="section-overview" class="seller-section active">
        <!-- Seller Analytics -->
        <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;margin-bottom:30px;">
            <div class="stat-card" style="background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <div style="font-size:24px;margin-bottom:10px;">📚</div>
                <div id="sellerTotalBooks" style="font-size:24px;font-weight:bold;color:#333;">0</div>
                <div style="color:#777;font-size:14px;">Total Books Listed</div>
            </div>
            <div class="stat-card" style="background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <div style="font-size:24px;margin-bottom:10px;">🛒</div>
                <div id="sellerTotalSold" style="font-size:24px;font-weight:bold;color:#333;">0</div>
                <div style="color:#777;font-size:14px;">Total Books Sold</div>
            </div>
            <div class="stat-card" style="background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <div style="font-size:24px;margin-bottom:10px;">💸</div>
                <div id="sellerRevenue" style="font-size:24px;font-weight:bold;color:#333;">₹0</div>
                <div style="color:#777;font-size:14px;">Total Revenue</div>
            </div>
            <div class="stat-card" style="background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <div style="font-size:24px;margin-bottom:10px;">⚠️</div>
                <div id="sellerLowStock" style="font-size:24px;font-weight:bold;color:#e74c3c;">0</div>
                <div style="color:#e74c3c;font-size:14px;font-weight:bold;">Low Stock Alerts</div>
            </div>
        </div>

        <!-- Notification Panel -->
        <div class="panel-card" style="margin-bottom:30px;">
            <h2>Seller Notifications</h2>
            <div id="sellerNotifications">
                <p style="color:#777;">No new alerts.</p>
            </div>
        </div>

        <div class="panel-card" style="margin-bottom:30px;">
            <h2>Publish a New Book</h2>
            <form id="sellerBookForm" class="seller-form">
                <div class="form-row">
                    <input type="text" id="bookTitle" placeholder="Book Title" required>
                    <input type="text" id="bookAuthor" placeholder="Author Name" required>
                </div>
                </div>
                <div class="form-row">
                    <input type="number" id="bookStock" placeholder="Stock Quantity" min="0" required>
                    <input type="number" id="bookPrice" placeholder="Price (₹)" min="1" required>
                </div>
                <div class="form-row">
                    <select id="bookCategory" required>
                        <option value="">Select Category</option>
                        <option value="story">Story</option>
                        <option value="novels">Novels</option>
                        <option value="philosophy">Philosophy</option>
                        <option value="history">History</option>
                        <option value="religious">Religious</option>
                        <option value="comics">Comics</option>
                        <option value="science">Science</option>
                        <option value="academic">Academic Books</option>
                    </select>
                </div>

                <label class="form-label">Book Cover Image</label>
                <input type="file" id="bookImageFile" accept="image/*">
                <span class="form-hint">— or paste an image URL —</span>
                <input type="text" id="bookImageUrl" placeholder="https://example.com/cover.jpg">

                <label class="form-label">Description</label>
                <textarea id="bookDescription" placeholder="A short synopsis of the book..."></textarea>

                <!-- Sellers cannot feature their own books, so no featured checkbox here! -->

                <button type="submit" class="primary-btn">Publish to TimelessPages</button>
            </form>
            <p id="sellerFormMessage" class="panel-message"></p>
        </div>

        <div class="panel-card">
            <h2>Your Catalog</h2>
            <div style="overflow-x:auto;">
                <table class="data-table" style="width:100%;border-collapse:collapse;margin-top:15px;text-align:left;">
                    <thead>
                        <tr style="border-bottom:2px solid #eee;">
                            <th style="padding:10px;">Product</th>
                            <th style="padding:10px;">Price</th>
                            <th style="padding:10px;">Stock</th>
                            <th style="padding:10px;">Sold</th>
                            <th style="padding:10px;">Demand</th>
                            <th style="padding:10px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksList">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
            </div>
        </div>
        </div> <!-- End of Overview -->

        <!-- Seller Insights Section -->
        <div id="section-seller-insights" class="seller-section" style="display:none;">
            <!-- Rendered by sellerInsights.js -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="sellerInsights.js"></script>
    <script src="seller.js"></script>
</body>

</html>
